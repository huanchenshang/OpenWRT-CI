# 锚点
pr: &pr {type: select, proxies: [🚀 节点选择, 🛠️ 手动切换, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇯🇵 日韩节点, 🇺🇲 美国节点, 🏳️ 其他节点, 🟢 直连]}
sel: &sel {type: select, proxies: [🟢 直连, 🚀 节点选择]}
p: &p {type: http, interval: 86400, health-check: {enable: true, url: "http://www.gstatic.com/generate_204", interval: 86400, timeout: 3, tolerance: 2}}
sg: &sg {type: select, include-all: true}
ut: &ut {type: url-test, include-all: true, url: "http://www.gstatic.com/generate_204", interval: 86400, tolerance: 100, lazy: true}
fb: &fb {type: fallback, include-all: true, url: "http://www.gstatic.com/generate_204", interval: 86400}

# 机场订阅，名称不能重复
proxy-providers:
  🛫 机场名字:
    <<: *p
    path: ./providers/proxy/airport.yaml
    url: "订阅链接"

# 全局配置
log-level: error
mode: rule
allow-lan: true
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
find-process-mode: strict    
global-client-fingerprint: chrome
keep-alive-idle: 300       
keep-alive-interval: 15
disable-keep-alive: false
ipv6: true   
unified-delay: true
tcp-concurrent: true
profile:
  store-selected: true
  store-fake-ip: true

# 控制面板
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-name: ""
external-ui-url: https://gh-proxy.com/https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

#TUN设置
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack: ["any:53","tcp://any:53"]

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.xn--ngstr-lra8j.com"
    - "rule-set:fakeip-filter"
    - "rule-set:private"
    - "rule-set:cn"
  default-nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24

proxies:
  - {name: 🟢 直连, type: direct, udp: true}

# 策略组
proxy-groups:
  - { name: 🚀 节点选择, type: select, proxies: [♻️ 自动选择, 🛠️ 手动切换, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇯🇵 日韩节点, 🇺🇲 美国节点, 🏳️ 其他节点, 🟢 直连] }
  - {name: 🛑 广告拦截, type: select, proxies: [REJECT, DIRECT]}
  - {name: 🐟 漏网之鱼, <<: *pr}
  - {name: 📺 巴哈姆特, <<: *pr}
  - {name: 🎧 Spotify, <<: *pr}
  - {name: 📹 Youtube, <<: *pr}
  - {name: 💻 GitHub, <<: *pr}
  #- {name: 🌐 OneDrive, <<: *sel}
  - {name: 🅰️ Adobe, <<: *pr}
  - {name: ☁️ Cloudflare, <<: *pr}
  - {name: 📲 Telegram, <<: *pr}
  - {name: 🤖 AI服务, <<: *pr}
  - {name: 🇬 谷歌服务, <<: *pr}
  - {name: Ⓜ️ 微软服务, <<: *pr}
  - {name: 🍎 苹果服务, <<: *sel}
  # 分隔,下面是地区分组
  - {name: 🇭🇰 香港节点, <<: *sg, filter: "(?i)(香港|hk|hongkong|hong kong)"}
  - {name: 🇨🇳 台湾节点, <<: *sg, filter: "(?i)(台|tw|taiwan)"}
  - {name: 🇸🇬 狮城节点, <<: *sg, filter: "(?i)(新加坡|sg|singapore)"}
  - {name: 🇯🇵 日韩节点, <<: *sg, filter: "(?i)(日本|jp|japan|韩|kr|korea)"}
  - {name: 🇺🇲 美国节点, <<: *sg, filter: "(?i)(美国|usa|us|unitedstates|united states)"}
  - {name: 🏳️ 其他节点, <<: *sg, filter: "^((?!(直连|港|台|新加坡|日|美|us|官网|剩余|套餐|群|延迟|原生|线路|教程|前置)).)*$"}
  - {name: 🛠️ 手动切换, <<: *sg, filter: "^((?!(直连|官网|剩余|套餐|群|延迟|原生|线路|教程|前置)).)*$"}
  - {name: ♻️ 自动选择, <<: *ut,  filter: "^((?!(直连|官网|剩余|套餐|群|延迟|原生|线路|教程|前置)).)*$"}

rules:
  
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - DST-PORT,3478,REJECT
  - DST-PORT,3479,REJECT
  - DST-PORT,5349,REJECT
  - DST-PORT,19302,REJECT
  - RULE-SET,ads,🛑 广告拦截
  - RULE-SET,private_ip,🟢 直连,no-resolve
  - RULE-SET,private,🟢 直连
  - RULE-SET,custom_direct,🟢 直连
  - RULE-SET,custom_proxy,🚀 节点选择
  - RULE-SET,spotify,🎧 Spotify
  - RULE-SET,youtube,📹 Youtube
  - RULE-SET,ai,🤖 AI服务
  - RULE-SET,google,🇬 谷歌服务
  - RULE-SET,google-cn,🇬 谷歌服务
  - RULE-SET,github,💻 GitHub
  #- RULE-SET,onedrive,🌐 OneDrive
  - RULE-SET,adobe,🅰️ Adobe
  - RULE-SET,adobe@cn,🅰️ Adobe
  - RULE-SET,bahamut,📺 巴哈姆特
  - RULE-SET,cloudflare,☁️ Cloudflare
  - RULE-SET,microsoft,Ⓜ️ 微软服务
  - RULE-SET,apple,🍎 苹果服务
  - RULE-SET,telegram,📲 Telegram
  - RULE-SET,google_ip,🇬 谷歌服务,no-resolve
  - RULE-SET,telegram_ip,📲 Telegram,no-resolve
  - RULE-SET,geolocation-!cn,🚀 节点选择
  - RULE-SET,cn,🟢 直连
  - RULE-SET,cn_ip,🟢 直连
  - MATCH,🐟 漏网之鱼

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  cl: &cl {type: http, interval: 86400, behavior: classical, format: yaml}
rule-providers:
  fakeip-filter: {<<: *domain, path: ./providers/rule/fakeip-filter.mrs, url: "https://gh-proxy.com/https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"}      
  private: {<<: *domain, path: ./providers/rule/private.mrs, url: "https://gh-proxy.com/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}
  ads: {<<: *domain, path: ./providers/rule/ads.mrs, url: "https://gh-proxy.com/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs"}
